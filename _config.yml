  Senior Platform Engineer / Lead SRE with 15+ years of experience designing and operating cloud-native platforms at scale.

  Specialized in Kubernetes and Red Hat OpenShift (ROSA), GitOps workflows, and multi-cloud architectures across AWS and Azure. Strong focus on Platform Engineering, centralized CI/CD frameworks, and enterprise observability.

  Proven track record leading large-scale transformations, including GitOps adoption, multi-region architectures, and enterprise monitoring standardization. Passionate about automation, reliability, and improving developer experience.

