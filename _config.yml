about_content: |
  Senior Platform Engineer / Lead SRE with 15+ years of experience designing, automating, and operating cloud-native platforms and enterprise infrastructure at scale.

  Specialized in Kubernetes, Red Hat OpenShift (ROSA), GitOps workflows, and designing robust deployment automation across AWS, Azure, and Hybrid/On-Premise environments. Strong expertise in Platform Engineering, centralized CI/CD frameworks (Azure DevOps, GitLab), automation via scripting (PowerShell, Bash), and enterprise observability.

  Proven track record leading large-scale transformations, optimizing high-availability mission-critical databases (SQL Server), and driving deployment reliability. Passionate about automation, system resiliency, and improving developer experience.

